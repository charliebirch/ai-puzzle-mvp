<article>
    <h3>Complete!</h3>
    {% if job.meta is defined and job.meta.manifest is defined %}
    <p>Cost: <strong>${{ "%.3f"|format(job.meta.manifest.total_cost_estimate) }}</strong></p>
    {% endif %}
    <div class="grid">
        <a href="/preview/{{ job.id }}" role="button">View Preview</a>
        <a href="/download/{{ job.id }}/preview" role="button" class="secondary">Download Preview</a>
    </div>
    <p style="margin-top: 1rem;">
        <a href="/">Start New Order</a> | <a href="/?rerun={{ job.id }}">Re-run with Different Style</a>
    </p>
</article>
